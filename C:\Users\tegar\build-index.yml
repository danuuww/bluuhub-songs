name: build-index
on:
  push:
    paths: ["approved/**"]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build index.json from approved/*.json
        run: |
          node -e '
            const fs=require("fs");
            const out=[];
            for(const f of fs.readdirSync("approved")){
              if(!f.endsWith(".json")) continue;
              try{
                const j=JSON.parse(fs.readFileSync("approved/"+f,"utf8"));
                if(j && j.title && Array.isArray(j.events)) out.push({title:j.title,bpm:j.bpm,events:j.events});
              }catch(e){}
            }
            fs.writeFileSync("index.json", JSON.stringify(out));
            console.log("indexed", out.length, "songs");
          '
      - name: Commit index
        run: |
          git config user.name "bluuhub-bot"
          git config user.email "bot@bluuhub.local"
          git add index.json
          git diff --cached --quiet || (git commit -m "build: community index" && git push)
